name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at midnight
  workflow_dispatch:       # 👈 Allows manual trigger from GitHub Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run tests
        run: python -m py_compile $(find . -name "*.py")

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t myapp .

  scheduled-training:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Install Kaggle API
      - name: Install Kaggle API
        run: pip install kaggle

      # ✅ Configure Kaggle credentials from GitHub Secrets
      - name: Configure Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${{ secrets.KAGGLE_USERNAME }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      # ✅ Download dataset from Kaggle
            # ✅ Download dataset from Kaggle
      - name: Download dataset
        run: |
          kaggle datasets download -d sriramr/fruits-fresh-and-rotten-for-classification -p ./data --unzip
          mv ./data/dataset/train ./data/train
          mv ./data/dataset/test ./data/test
          rm -rf ./data/dataset   # cleanup



      - name: Run training
        run: python scripts/train.py --data ./data
